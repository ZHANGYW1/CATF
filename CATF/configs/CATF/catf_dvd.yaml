name: dvd

__base_cfg__: ./../base_dvd.yaml

dataset:
    train:
        num_frames: 5
        loader:
            batch_size: 5
            num_workers: 5

    val:
        num_frames: 5


meta_arch: SingleScalePlainCNN
model:
    name: CATF
    in_channels: 3
    inner_channels: 256
    num_frames: 3
    num_frames1: 2
    patch_size: 4
    cnn_patch_embedding: True
    patch_embedding_size: 4
    num_layer_rec: 3
    temporal_patchsize: 4
    num_heads: 8
    dropout: 0.0
    ffn_dim: None
    ms_fuse: True

loss:
    criterion:
    - name: CharbonnierLoss
    - name: PerceptualLossVGG19

    weights:
    - 1.0
    - 0.0001

schedule:
    epochs: 2001
    val_epochs: 20

    optimizer:
        name: Adam
        lr: 0.0003
        betas: [0.9, 0.99]
        weight_decay: 0

    lr_scheduler:
        name: CosineAnnealingLR_Restart
        T_period: [1000, 1001]
        restarts: [1000]
        weights: [1]

logging:
    period: 20

ckpt:
    period: 20


work_dir: ./workdir/catf
resume_from: None
init_mode: True